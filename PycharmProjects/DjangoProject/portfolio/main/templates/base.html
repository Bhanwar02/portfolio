<!DOCTYPE html>
<html>
<head>
    <title>Bhanwarpreet Kaur-Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='50' fill='black'/>
<text x='50' y='63' font-size='52' text-anchor='middle' fill='%23a855f7' font-family='Arial' font-weight='bold'>B</text>
</svg>">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: white;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .logo {
            font-weight: bold;
        }

        .logo span {
            color: #a855f7;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        .btn-outline {
            border: 1px solid #a855f7;
            padding: 8px 15px;
            border-radius: 10px;
        }

        .btn-outline:hover
        {
            transition: 0.3s ease;
            transform: translateY(-2px);
            background: linear-gradient(to right, #6366f1, #a855f7);
        }

        /* HERO */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 80px;
        }

        .hero-left {
            width: 55%;
        }

        .hero-right {
            max-width: 500px;
            line-height: 1.7;
            color: #aaa;
        }

        .hello {
            font-style: italic;
            font-size: 40px;
            color: #ccc;
        }

        .main-text {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }

        .highlight {
            font-style: italic;
            color: #ccc;
        }

        /* BUTTONS */
        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            margin-right: 10px;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover{
            transition: 0.3s ease;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        .btn-primary {
            background: linear-gradient(to right, #ec4899, #8b5cf6);
            color: white;
        }

        .btn-secondary {
            border: 1px solid #8b5cf6;
            color: white;
        }

.about-section {
    margin-top: 100px;
}

.about-title {
    font-size: 48px;
    margin-bottom: 30px;
}

.about-container {
    display: flex;
    justify-content: space-between;
    gap: 40px;
}

.about-left {
    max-width: 500px;
    line-height: 1.7;
}

.about-right {
    max-width: 500px;
    line-height: 1.7;
    color: #aaa;
}

.italic-text {
    font-style: italic;
    color: #ccc;
    margin-top: 10px;
}

.social-icons {
    margin-top: 20px;
}

.social-icons a {
    display: inline-block;
    border: 1px solid #8b5cf6;
    padding: 10px 15px;
    margin-right: 10px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.social-icons a:hover {
    background: #8b5cf6;
}

.skills-section {
    margin-top: 100px;
}

.skills-title
{
    font-size: 48px;
}
.skills-container {
    display: flex;
    grid-template-columns: 35% 65%;
}

.skills-left {
    flex: 1;
    line-height: 1.7;
}

.skills-right {
    flex: 2;
    max-width: 500px;
    line-height: 1.7;
    color: #aaa;
}

.skill-tags {
    margin-top: 20px;
}

.skill-tags span {
    background: #111827;
    border: 1px solid #1f2937;
    color: #ccc;
    padding: 8px 15px;
    border-radius: 20px;
    transition: 0.3s;
}

.skill-tags span:hover {
    border-color: #a855f7;
    color: white;
}

.skills-grid {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.skills-grid div {
    background: #0f172a;
    padding: 14px;
    border-radius: 10px;
    text-align: left;
    border: 1px solid #1f2937;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    transition: all 0.3s ease;
}

.skills-grid div i {
    color: #a855f7;
    font-size: 18px;
}

.skills-grid div:hover {
    border-color: #a855f7;
    transform: translateY(-4px) scale(1.02);
    background: #111827;
}

.skills-grid div:hover {
    box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
}

/* ========================= */
/* PROJECT SECTION */
/* ========================= */

.projects-section {
    margin-top: 100px;
}

.section-title {
    font-size: 56px;
    font-weight: 700;
    margin-bottom: 60px;
}

/* PROJECT CARD */

.project-card {
    background: #050816;
    border: 1px solid #1f2937;
    border-radius: 24px;
    padding: 30px;
    margin-bottom: 80px;
    transition: 0.4s;
}

.project-card:hover {
    border-color: #a855f7;
    transform: translateY(-6px);
}

/* IMAGE */

.project-image img {
    width: 100%;
    border-radius: 18px;
    margin-bottom: 40px;
}

/* CONTENT */

.project-content {
    display: flex;
    justify-content: space-between;
    gap: 60px;
}

/* LEFT */

.project-info {
    flex: 1;
}

.project-info h3 {
    font-size: 40px;
    margin-bottom: 25px;
    font-style: italic;
}

.project-stats p {
    margin-bottom: 15px;
    color: #d1d5db;
    font-size: 18px;
}

/* RIGHT */

.project-description {
    flex: 2;
}

.project-description p {
    color: #cbd5e1;
    line-height: 1.9;
    font-size: 17px;
    margin-top: 25px;
}

/* BUTTONS */

.project-buttons {
    display: flex;
    gap: 18px;
}

.live-btn,
.code-btn {
    padding: 12px 24px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    border: 1px solid #374151;
    transition: 0.3s;
    font-weight: 500;
}

.live-btn {
    border: 1px solid #a855f7;
}

.live-btn:hover,
.code-btn:hover {
    transform: translateY(-3px);
    border-color: #a855f7;
}

/* TECH STACK */

.tech-stack {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 30px;
}

.tech-stack span {
    padding: 10px 18px;
    background: #111827;
    border: 1px solid #2d3748;
    border-radius: 12px;
    font-size: 14px;
    color: #d1d5db;
    transition: 0.3s;
}

.tech-stack span:hover {
    border-color: #a855f7;
    transform: translateY(-3px);
    color: white;
}

/* RESPONSIVE */

@media (max-width: 768px) {

    .project-content {
        flex-direction: column;
    }

    .project-info h3 {
        font-size: 30px;
    }

    .section-title {
        font-size: 42px;
    }

}

.experience-section {
    margin-top: 120px;
}

.experience-title {
    font-size: 48px;
    margin-bottom: 60px;
}

.experience-item {
    display: flex;
    gap: 80px;
    margin-bottom: 80px;
}

.experience-left {
    flex: 1;
}

.experience-right {
    flex: 2;
    color: #ccc;
}

.experience-left h3 {
    font-size: 32px;
    margin-bottom: 10px;
}

.company-name {
    font-style: italic;
    color: #aaa;
    margin-bottom: 30px;
}

.company-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 25px;
}

.visit-link {
    text-decoration: none;
    color: #a855f7;
    border: 1px solid #a855f7;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 14px;
    transition: 0.3s;
}

.visit-link:hover {
    background: #a855f7;
    color: white;
}

.timeline {
    display: flex;
    align-items: center;
    gap: 15px;
}

.timeline span {
    width: 12px;
    height: 12px;
    background: #a855f7;
    border-radius: 50%;
    display: block;
}

.timeline p {
    color: #aaa;
}

.experience-right p {
    margin-bottom: 25px;
    line-height: 1.8;
}

.contact-section {
    margin-top: 120px;
    margin-bottom: 100px;
}

.contact-container {
    display: flex;
    gap: 60px;
}

.contact-left {
    flex: 1;
}

.contact-right {
    padding-top: 10px;
}

.contact-heading {
    font-size: 64px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: -2px;
}

.contact-email {
    margin-top: 30px;
    font-style: italic;
    color: #ccc;
}

.contact-socials {
    margin-top: 30px;
}

.contact-socials a {
    display: inline-block;
    background: #111827;
    border: 1px solid #1f2937;
    padding: 12px 18px;
    margin-right: 10px;
    margin-top: 10px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.contact-socials a:hover {
    border-color: #8b5cf6;
    transform: translateY(-3px);
}

.contact-text {
    color: #aaa;
    margin-bottom: 30px;
}

.input-row {
    display: flex;
    gap: 20px;
}

.input-row div {
    flex: 1;
}

label {
    display: block;
    margin-bottom: 8px;
    margin-top: 20px;
}

input,
textarea {
    width: 100%;
    background: #0f172a;
    border: 1px solid #1e293b;
    color: white;
    padding: 16px;
    border-radius: 12px;
    font-size: 15px;
    transition: 0.3s;
}

input:focus,
textarea:focus {
    outline: none;
    border-color: #8b5cf6;
}

.send-btn {
    margin-top: 25px;
    background: linear-gradient(to right, #6366f1, #a855f7);
    color: white;
    border: none;
    padding: 14px 22px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}
.send-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
}

.footer {
    margin-top: 120px;
    padding: 50px 0;
    border-top: 1px solid #1f2937;
}

.footer-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 40px;
}

.footer-left {
    display: flex;
    gap: 60px;
}

.footer-box h4 {
    font-size: 15px;
    color: #888;
    margin-bottom: 10px;
}

.footer-box p {
    font-size: 18px;
    color: white;
    font-style: italic;
}

.hosting-box {
    background: #111827;
    border: 1px solid #1f2937;
    padding: 15px 25px;
    border-radius: 12px;
    transition: 0.3s;
}

.hosting-box:hover {
    border-color: #8b5cf6;
    transform: translateY(-3px);
}

.footer-bottom {
    margin-top: 40px;
    text-align: center;
    color: #777;
    font-size: 14px;
}

@media (max-width: 768px) {

    .hero,
    .about-container,
    .skills-container,
    .contact-container,
    .input-row {
        flex-direction: column;
    }

    .hero-left,
    .hero-right,
    .about-left,
    .about-right,
    .skills-left,
    .skills-right,
    .contact-left,
    .contact-right {
        width: 100%;
    }

    .main-text {
        font-size: 36px;
    }

    .contact-heading {
        font-size: 38px;
    }

    nav {
        flex-direction: column;
        gap: 20px;
    }
}  @media (max-width: 768px) {

    .footer-container,
    .footer-left {
        flex-direction: column;
        align-items: flex-start;
    }

    .footer-left {
        gap: 30px;
    }

}

        @media (max-width: 768px) {

    .experience-item {
        flex-direction: column;
        gap: 30px;
    }

    .experience-title {
        font-size: 38px;
    }

}

    </style>
</head>

<body>

<div class="container">

<nav>
    <div class="logo">
    <strong>Bhanwarpreet Kaur</strong><br>
    <span style="font-size:12px;">Backend Developer</span>
</div>

    <div>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#experience">Experience</a>
        <a href="#contact" class="btn-outline">Contact</a>
    </div>
</nav>

{% block content %}
{% endblock %}

</div>

</body>
</html>
